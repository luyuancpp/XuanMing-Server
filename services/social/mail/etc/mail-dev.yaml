# Pandora mail 服务开发期配置(2026-06-29)。
#
# - gRPC :50009 / HTTP :51009(仅 /metrics)
# - MailService:系统/公会邮件拉取式(channel+watermark),个人邮件写扩散(离线可达)
# - MySQL 强依赖(pandora_social 库:sys_mail/guild_mail/player_mail/player_mail_cursor/player_mail_claim;读 guild_members 判玩家所属公会)
# - 不依赖 kafka(系统/公会拉取,个人落库即达)
# - dev: enable_reflection=true 便于 grpcurl 联调

server:
  grpc:
    network: tcp
    addr: ":50009"
    timeout: "15s"
    enable_reflection: true
  http:
    network: tcp
    addr: ":51009"

node:
  zone_id: 1
  mysql_client:
    dsn: "pandora:pandora_dev_pwd@tcp(127.0.0.1:3307)/pandora_social?parseTime=true&loc=UTC&charset=utf8mb4&collation=utf8mb4_0900_ai_ci"
    max_open_conns: 32
    max_idle_conns: 8
    conn_max_lifetime: "30m"
    ping_timeout: "3s"

mail:
  # 系统/公会邮件 end_ms 为 0 时的默认有效期天数
  default_sys_ttl_days: 7
  max_title_len: 64
  max_body_len: 2048
  max_attachments: 16
  # inventory 服务 gRPC 地址,领取附件入库;留空且 allow_noop_grant=true 时仅标记不发奖
  inventory_addr: "127.0.0.1:50015"
  allow_noop_grant: false
