# Pandora login 服务开发期配置(W2 ③,W3 ⑥ 2026-06-05 重写)。
#
# - gRPC 端口 50001 / HTTP 端口 51001(同时暴露 /metrics 和 RESTful)
# - W3 ② 起接 MySQL(pandora_account)+ Redis 真实化(session / ticket jti)
# - W3 ⑤ 起接 player_locator(登录成功后 SetLocation(LOGIN_PENDING))
# - W3 ⑥ 起 duration 字段用 pkg/config.Duration 包装,yaml 可直接写 "5s" / "24h"
#   (此前的 "Kratos JSON 不解 duration,yaml 不写时长字段" 限制已解除)
# - W3 ③ 起 server.grpc.enable_reflection 可控,dev: true / prod: false(零值)

server:
  grpc:
    network: tcp
    addr: ":50001"
    timeout: "15s"              # demo:弱网/本机抖动下 unary RPC 放宽;prod 再按接口收紧
    enable_reflection: true     # dev:开 reflection 便于 grpcurl 联调;prod 留空 = false 关闭
  http:
    network: tcp
    addr: ":51001"

node:
  zone_id: 1
  session_expire_min: 1440
  redis_client:
    host: "127.0.0.1:6380"      # Pandora Redis 端口(deploy/docker-compose.dev.yml)
    db: 0
    dial_timeout: "2s"          # W3 ⑥ 示范:Duration 字符串(此前必须 yaml 留空走 pkg 默认)
  # W3 ② 接 MySQL:dev 连本机 docker mysql 的 pandora_account 库。
  # DSN 留空 → fallback 到 MockAccountRepo(不接 mysql 也能跑通 login 联调)。
  mysql_client:
    dsn: "pandora:pandora_dev_pwd@tcp(127.0.0.1:3307)/pandora_account?parseTime=true&loc=UTC&charset=utf8mb4&collation=utf8mb4_0900_ai_ci"
    max_open_conns: 32
    max_idle_conns: 8
    conn_max_lifetime: "30m"    # W3 ⑥ 示范
    ping_timeout: "3s"

snowflake:
  epoch: 1773446400
  node_bits: 17
  step_bits: 15

locker:
  account_lock_ttl: 10
  player_lock_ttl: 10

# RPC 级临时关停(Kill-Switch):某个 RPC/service 出问题想临时关、修好再开。
#   - source=file:改下面 file_path 指向的 yaml 即热生效(dev 推荐,零依赖)
#   - source=etcd:prod 用,多实例一致;需 login main 里 blank import pkg/killswitch/etcdkv
#   - 关停操作见 docs/ops/service-killswitch.md
killswitch:
  enabled: true
  source: "file"
  file_path: "etc/killswitch.yaml"   # 相对各服务工作目录;改这个文件即生效
  # fail_closed: false               # 默认 false = fail-open(开关系统故障也放行,不拖垮服务)

login:
  session_token_ttl: "24h"      # W3 ⑥ 示范:此前靠 Defaults() 填,现可直写
  ds_ticket_ttl: "5m"           # 不变量 §3:DS 票据短时效
  mock_hub_ds_addr: "127.0.0.1:7777"
  mock_account: "test"
  mock_password_hash: "abc"

  # 开发期免密登录(⚠️ 仅本机 / 联调,严禁上生产):
  #   true  → 跳过密码校验;账号不存在时自动懒注册,返回稳定 player_id
  #           客户端随便填一个账号名就能进,无需独立注册流程
  #   false → 走正常 bcrypt 密码校验
  dev_skip_password: true

  # 开发期“假注册”(⚠️ 仅本机 / 联调,严禁上生产):
  #   true  → 账号不存在时首登自动注册(存本次密码 bcrypt 哈希),
  #           单开此项时后续用同密码走正常校验(“首登即注”)
  #   false → 账号不存在直接报 ErrLoginAccountNotFound
  dev_auto_register: true

  # JWT(W3 ①,2026-06-05):HS256 共享密钥模式。
  # ⚠️ secret 跟 deploy/envoy/envoy.yaml jwt_authn provider 必须一致(envoy 那边
  #    放的是 base64url(secret) 的 JWKS)。可用以下命令算出 base64url:
  #      python -c "import base64; print(base64.urlsafe_b64encode(b'pandora-dev-jwt-secret-change-me-32!').rstrip(b'='))"
  jwt:
    issuer: "pandora-login"
    audience: "pandora-client"
    secret: "pandora-dev-jwt-secret-change-me-32!"
    session_ttl: "24h"          # W3 ⑥ 示范
    ds_ticket_ttl: "5m"

  # W3 ⑤(2026-06-05):登录成功后调 PlayerLocatorService.SetLocation(state=LOGIN_PENDING)。
  # addr 留空 → 不调 locator(login 仍可独立跑;hub DS 接入后由 hub 上报 HUB 状态)。
  locator:
    addr: "127.0.0.1:50006"

  # W4 ⑥(2026-06-06):登录成功后调 HubAllocatorService.AssignHub 拿真实 hub_ds_addr + hub_ticket。
  # addr 留空 → 不调 hub_allocator(login 回退自签 hub 票据 + mock_hub_ds_addr,可独立联调)。
  # region 空 → 让 hub_allocator 选最空分片。
  hub:
    addr: "127.0.0.1:50021"
    region: "cn"
