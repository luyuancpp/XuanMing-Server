# Pandora trade 服务开发期配置(2026-06-16)。
#
# - gRPC :50012 / HTTP :51012(仅 /metrics)
# - Redis 强依赖(订单状态机 WATCH/MULTI/EXEC 乐观锁,存 Order proto bytes)
# - Kafka 弱依赖(生产 pandora.trade.audit,订单流转审计 / 对账)
# - dev: enable_reflection=true 便于 grpcurl 联调

server:
  grpc:
    network: tcp
    addr: ":50012"
    timeout: "15s"              # demo:弱网/本机抖动下 unary RPC 放宽;prod 再按接口收紧
    enable_reflection: true     # dev 开;prod 关(零值=false)
  http:
    network: tcp
    addr: ":51012"

node:
  zone_id: 1
  redis_client:
    host: "127.0.0.1:6380"
    db: 0
    dial_timeout: "2s"
    read_timeout: "1s"
    write_timeout: "1s"

# kafka producer 配置(发布 pandora.trade.audit)
# brokers 9093 = Pandora 端口规划(与 vanilla 9092 区分)
kafka:
  brokers: ["127.0.0.1:9093"]
  dial_timeout: "2s"
  write_timeout: "5s"
  idempotent: true

snowflake:
  epoch: 1773446400
  node_bits: 17
  step_bits: 15

trade:
  # order_ttl: 订单 Redis key 存活时长(应 > order_expire,留查询窗口)
  order_ttl: "10m"
  # order_expire: 订单从创建到自动过期(超时未完成两阶段确认 → 惰性置 EXPIRED)
  order_expire: "5m"
  # optimistic_retry: WATCH/MULTI/EXEC 冲突时最大重试次数
  optimistic_retry: 3
  # max_items_per_order: 单订单最大物品条目数
  max_items_per_order: 20
