# Pandora inventory 服务开发期配置(W5 ③,2026-06-18)。
#
# - gRPC :50015 / HTTP :51015(仅 /metrics)
# - MySQL 强依赖(pandora_trade 库:player_currency + player_items + inventory_ledger,
#   发放 / 使用 / 出售幂等 inventory_ledger uk,不变量 §9.7)
# - dev: enable_reflection=true 便于 grpcurl 联调

server:
  grpc:
    network: tcp
    addr: ":50015"
    timeout: "15s"              # demo:弱网/本机抖动下 unary RPC 放宽;prod 再按接口收紧
    enable_reflection: true     # dev 开;prod 关(零值=false)
  http:
    network: tcp
    addr: ":51015"

node:
  zone_id: 1
  # MySQL:dev 连本机 docker mysql 的 pandora_trade 库(强依赖,DSN 必填)。
  mysql_client:
    dsn: "pandora:pandora_dev_pwd@tcp(127.0.0.1:3307)/pandora_trade?parseTime=true&loc=UTC&charset=utf8mb4&collation=utf8mb4_0900_ai_ci"
    max_open_conns: 32
    max_idle_conns: 8
    conn_max_lifetime: "30m"
    ping_timeout: "3s"

inventory:
  # item_rules: 道具大厅经济规则表(留空 = 任何道具都不可大厅使用 / 出售,安全默认)。
  # 正式项目应来自配置表服务;W5 ③ demo 给两条样例(经验书可用,材料可卖)。
  item_rules:
    - item_config_id: 2001     # 经验书:大厅可用
      usable: true
    - item_config_id: 3001     # 材料:可出售,单价 10 金币
      sellable: true
      sell_unit_price: 10
