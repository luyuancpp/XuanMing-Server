# Pandora hub_allocator 服务开发期配置(W4 ⑤,2026-06-06)。
#
# - gRPC :50021 / HTTP :51021(仅 /metrics)
# - Redis 强依赖(大厅 DS 分片镜像 + 玩家归属 + 心跳超时 ZSET 扫描)
# - JWT 强依赖(AssignHub / TransferHub 签 hub DSTicket,不变量 §3)
# - W4 ⑤ 用 MockHubFleetProvider(种确定性假分片),真 Agones Fleet 接入留后续
# - duration 字段用 pkg/config.Duration,yaml 可直接写 "15s"
# - dev: enable_reflection=true 便于 grpcurl 联调

server:
  grpc:
    network: tcp
    addr: ":50021"
    timeout: "15s"              # demo:弱网/本机抖动下 unary RPC 放宽;prod 再按接口收紧
    enable_reflection: true     # dev 开;prod 关(零值=false)
  http:
    network: tcp
    addr: ":51021"

node:
  zone_id: 1
  redis_client:
    host: "127.0.0.1:6380"
    db: 0
    dial_timeout: "2s"
    read_timeout: "1s"
    write_timeout: "1s"

# jwt: 给玩家签 hub DSTicket(不变量 §3 短时效 5min)
# secret/issuer/audience 必须与 login 服务 + Envoy jwt_authn provider 完全一致
jwt:
  issuer: "pandora-login"
  audience: "pandora-client"
  secret: "pandora-dev-jwt-secret-change-me-32!"
  session_ttl: "24h"
  ds_ticket_ttl: "5m"

# kafka producer 配置(发布 pandora.hub.migrate 强制整合迁移通知,push 服务订阅消费)。
# 弱依赖:brokers 不通只警告不阫塞。brokers 为空 + consolidation_enabled=true 时,
# 迁移仅靠 Hub DS drain 心跳指令兜底(无无缝倒计时推送)。brokers 9093 = Pandora 端口规划。
kafka:
  brokers: ["127.0.0.1:9093"]
  dial_timeout: "2s"
  write_timeout: "5s"
  idempotent: true

hub:
  # heartbeat_timeout: Hub DS 心跳超时阈值(不变量 §4),超过没收到 Heartbeat → 分片 draining 停止分配
  heartbeat_timeout: "15s"
  # sweep_interval: 后台心跳超时扫描间隔
  sweep_interval: "5s"
  # shard_ttl: 分片镜像 Redis key TTL(每次 Assign/Heartbeat 刷新)
  shard_ttl: "30m"
  # assignment_ttl: 玩家→分片归属 Redis key TTL(每次 Assign/Transfer 刷新)
  assignment_ttl: "30m"
  # default_region: AssignHub 未指定 region 时的兜底分区
  default_region: "cn"
  # default_capacity: 单分片人数上限(大厅 500 人/实例)
  default_capacity: 500
  # autoscale_enabled: Hub Fleet 自动扩缩容。
  # ⚠️ 只在 agones.enabled=true(真 Fleet scaler)时生效:Mock provider 是拓扑-only 不实现 scaler,
  # 开了也不会运行(进程启动会打 autoscale_inert_under_mock 告警)。dev 默认走 Mock → 此处保持 false。
  # 想在本机验真实扩缩容:设 agones.enabled=true + minikube/Agones 环境。整合逻辑本身有 biz 单测覆盖。
  autoscale_enabled: false
  # players_per_hub: 单 Hub 目标承载人数(>500 自动扩容到新大厅)
  players_per_hub: 500
  # min_replicas: 开服默认拉起大厅副本数(可配置)
  min_replicas: 1
  # max_replicas: 大厅副本上限(防止异常扩容)
  max_replicas: 20
  # consolidation_enabled: 强制整合(低负载时把人换到该去的分片,排空后缩容)。
  # 依赖 autoscale_enabled=true(故同样需 agones.enabled=true 才生效)+ kafka.brokers(推无缝迁移通知)。
  # Mock 模式下不会运行(避免对假分片/假玩家跑搬迁误导);搬迁逻辑由 biz 单测验证。
  consolidation_enabled: false
  # migrate_grace_seconds: 迁移优雅倒计时(秒),客户端/Hub DS 提示倒计时 + 缩容回收最短等待
  migrate_grace_seconds: 30
  # consolidation_batch: 单次 reconcile 每个排空分片最多迁移人数(防撑死,超过部分下个周期续排)
  consolidation_batch: 50
  # optimistic_retry: WATCH/MULTI/EXEC 乐观锁冲突最大重试次数
  optimistic_retry: 3
  # mock_shard_count: W4 ⑤ MockHubFleetProvider 每 region 种的假分片数
  mock_shard_count: 3
  # mock_hub_addr_host: Mock 分片返回的假 Hub DS host
  mock_hub_addr_host: "127.0.0.1"
  # mock_hub_port_base: Mock 分片端口基址(分片 port = base + shard_id)
  mock_hub_port_base: 7777

# W4 ⑬: 真 Agones Hub DS Fleet 发现配置。
# dev 默认 enabled=false 走 Mock(本机无 k8s/Agones 也能跑 hub_allocator)。
# 本地 minikube 联调:enabled=true + fleet_name + api_server(minikube apiserver) + token_path。
# 集群内运行时 api_server/token_path/ca_path 可留空用 in-cluster 默认。
agones:
  enabled: false
  # api_server: "https://kubernetes.default.svc"   # in-cluster 默认;minikube 外联填 https://<minikube-ip>:8443
  # namespace: "default"
  fleet_name: "pandora-hub"
  # token_path: "/var/run/secrets/kubernetes.io/serviceaccount/token"  # in-cluster 默认;"-" 禁用 token
  # ca_path: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"     # in-cluster 默认
  # insecure_skip_tls_verify: false   # 仅 dev(minikube 外联自签证书时可临时开)
  list_timeout: "5s"
