# Pandora leaderboard 服务开发期配置(通用排行榜,2026-06-27)。
#
# - gRPC :50007 / HTTP :51007(仅 /metrics)
# - Redis 强依赖(排行榜 ZSET pandora:lb:{<board>}:z + tie-break/meta 辅助 key)
# - MySQL 强依赖(结算归档库 pandora_leaderboard:leaderboard_settlement/_snapshot/_reward_log)
# - Kafka 弱依赖(结算事件 pandora.leaderboard.settle)
# - inventory 弱依赖(结算发奖 GrantItems;留空且 allow_noop_reward=true 才退占位)
# - dev: enable_reflection=true 便于 grpcurl 联调

server:
  grpc:
    network: tcp
    addr: ":50007"
    timeout: "15s"
    enable_reflection: true     # dev 开;prod 关
  http:
    network: tcp
    addr: ":51007"

node:
  zone_id: 1
  mysql_client:
    # 结算归档库 pandora_leaderboard(单库即可,无分库需求:结算是低频写)。
    dsn: "pandora:pandora_dev_pwd@tcp(127.0.0.1:3307)/pandora_leaderboard?parseTime=true&charset=utf8mb4&loc=UTC"
    max_open_conns: 10
    max_idle_conns: 5
  redis_client:
    host: "127.0.0.1:6380"
    db: 0
    dial_timeout: "2s"
    read_timeout: "1s"
    write_timeout: "1s"

# kafka producer 配置(发布 pandora.leaderboard.settle)
# brokers 9093 = Pandora 端口规划(与 vanilla 9092 区分)
kafka:
  brokers: ["127.0.0.1:9093"]
  dial_timeout: "2s"
  write_timeout: "5s"
  idempotent: true

snowflake:
  epoch: 1773446400
  node_bits: 17
  step_bits: 15

leaderboard:
  default_list_limit: 50         # GetRange 默认返回条数
  max_list_limit: 200            # GetRange / GetAround 单次返回上限
  default_around_radius: 10      # GetAround 默认上下名数
  default_settle_top_n: 100      # SettleBoard 未指定 top_n 时默认结算前 N 名
  # inventory 内网 gRPC 地址(:50015)。配上 → 结算按 RewardTable 走真实发奖(GrantItems,
  # 幂等键 lb:<settlement_id>:<entity_id>);仅无背包联调/单测可留空并显式设 allow_noop_reward=true。
  inventory_addr: "127.0.0.1:50015"
  allow_noop_reward: false       # 留空 inventory_addr 时是否允许占位发奖(不真实入账)
