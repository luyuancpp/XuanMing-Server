// Pandora 全局错误码。
//
// 段位规划(必须跟 pkg/errcode/errcode.go 完全同步):
//   0           = OK
//   1-999       = 公共错(网络、超时、参数、权限)
//   1000-1999   = login
//   2000-2999   = player
//   3000-3999   = team
//   4000-4999   = match
//   5000-5999   = ds_allocator / hub_allocator
//   6000-6999   = battle_result
//   7000-7999   = trade
//   8000-8999   = dialogue
//   9000-9999   = chat / friend / locator / push / guild / group
//   10000-10999 = data_service
//   11000-11999 = 预留
//   12000-12999 = auction(全服拍卖行 / 撮合)
//   13000-13999 = leaderboard(通用排行榜)
//
// 字段编号永不复用(reserved 不删)。改 enum 值名 = breaking change,禁止。

syntax = "proto3";

package pandora.common.v1;

enum ErrCode {
  // 0:成功
  OK = 0;

  // 1-999 公共
  ERR_UNKNOWN          = 1;
  ERR_INTERNAL         = 2;
  ERR_TIMEOUT          = 3;
  ERR_INVALID_ARG      = 4;
  ERR_NOT_FOUND        = 5;
  ERR_ALREADY_EXISTS   = 6;
  ERR_PERMISSION_DENY  = 7;
  ERR_UNAUTHORIZED     = 8;
  ERR_RATE_LIMITED     = 9;
  ERR_UNAVAILABLE      = 10;
  ERR_CANCELED         = 11;
  ERR_INVALID_STATE    = 12;
  ERR_SERVICE_DISABLED = 13;  // RPC 被 Kill-Switch 临时关停(维护中,稍后可重试)

  // 1000-1999 login
  ERR_LOGIN_ACCOUNT_NOT_FOUND  = 1001;
  ERR_LOGIN_PASSWORD_MISMATCH  = 1002;
  ERR_LOGIN_DEVICE_BANNED      = 1003;
  ERR_LOGIN_ACCOUNT_BANNED     = 1004;
  ERR_LOGIN_TOO_MANY_DEVICES   = 1005;
  ERR_LOGIN_TICKET_EXPIRED     = 1010;
  ERR_LOGIN_TICKET_INVALID     = 1011;
  ERR_LOGIN_TICKET_REPLAYED    = 1012;

  // 2000-2999 player
  ERR_PLAYER_NOT_FOUND         = 2001;
  ERR_PLAYER_VERSION_MISMATCH  = 2002;
  ERR_PLAYER_NICKNAME_TAKEN    = 2003;
  ERR_PLAYER_HERO_LOCKED       = 2010;
  ERR_PLAYER_HERO_ALREADY_OWN  = 2011;
  ERR_PLAYER_FEATURE_DISABLED  = 2020;
  ERR_PLAYER_INSUFFICIENT_POINTS = 2021;
  ERR_REWARD_ALREADY_CLAIMED   = 2030;  // 该奖励档位已领取(幂等命中)
  ERR_REWARD_UNKNOWN_ID        = 2031;  // 奖励配置 ID 非法 / 超出 bit 索引上界

  // 3000-3999 team
  ERR_TEAM_NOT_FOUND           = 3001;
  ERR_TEAM_FULL                = 3002;
  ERR_TEAM_NOT_CAPTAIN         = 3003;
  ERR_TEAM_ALREADY_IN_TEAM     = 3004;
  ERR_TEAM_INVITE_EXPIRED      = 3005;
  ERR_TEAM_WRONG_STATE         = 3006;
  ERR_TEAM_CONCURRENT          = 3007;  // WATCH/MULTI/EXEC 乐观锁重试耗尽

  // 4000-4999 match
  ERR_MATCH_NOT_FOUND          = 4001;
  ERR_MATCH_ALREADY_MATCHING   = 4002;
  ERR_MATCH_CONFIRM_TIMEOUT    = 4003;
  ERR_MATCH_DECLINED           = 4004;
  ERR_MATCH_TEAM_NOT_READY     = 4005;
  ERR_MATCH_CONCURRENT         = 4006;  // WATCH/MULTI/EXEC 乐观锁重试耗尽

  // 5000-5999 DS / Hub allocator
  ERR_DS_NO_AVAILABLE          = 5001;
  ERR_DS_ALLOCATION_FAILED     = 5002;
  ERR_DS_POD_NOT_FOUND         = 5003;
  ERR_DS_HEARTBEAT_TIMEOUT     = 5004;
  ERR_HUB_NO_AVAILABLE         = 5101;
  ERR_HUB_TRANSFER_FAILED      = 5102;
  ERR_HUB_LINE_FULL            = 5103;  // 玩家切线:目标线路已满
  ERR_HUB_TRANSFER_COOLDOWN    = 5104;  // 玩家切线:冷却中(防刷)
  ERR_HUB_TRANSFER_NOT_IN_HUB  = 5105;  // 玩家切线:不在大厅(战斗/匹配中禁止切线)

  // 6000-6999 battle_result
  ERR_BATTLE_RESULT_DUPLICATE  = 6001;
  ERR_BATTLE_RESULT_DECODE     = 6002;
  ERR_BATTLE_RESULT_DB_WRITE   = 6003;

  // 7000-7999 trade
  ERR_TRADE_ORDER_NOT_FOUND    = 7001;
  ERR_TRADE_ORDER_EXPIRED      = 7002;
  ERR_TRADE_WRONG_STATE        = 7003;
  ERR_TRADE_INSUFFICIENT       = 7004;
  ERR_TRADE_LOCK_FAILED        = 7005;

  // 7010-7019 inventory(背包,同属 economy 域)
  ERR_INVENTORY_ITEM_NOT_FOUND = 7010;
  ERR_INVENTORY_INSUFFICIENT   = 7011;
  ERR_INVENTORY_ITEM_NOT_USABLE = 7012;
  ERR_INVENTORY_NOT_SELLABLE   = 7013;
  ERR_INVENTORY_LOCK_FAILED    = 7014;
  ERR_INVENTORY_IDEMPOTENCY_CONFLICT = 7015; // idempotency_key 复用到不同请求(指纹不一致)

  // 8000-8999 dialogue
  ERR_DIALOGUE_NOT_FOUND       = 8001;
  ERR_DIALOGUE_OPTION_INVALID  = 8002;

  // 9000-9999 chat / friend / locator
  ERR_CHAT_CHANNEL_INVALID     = 9001;
  ERR_CHAT_MESSAGE_TOO_LONG    = 9002;
  ERR_CHAT_MUTED               = 9003;

  ERR_FRIEND_NOT_FOUND         = 9101;
  ERR_FRIEND_ALREADY_ADDED     = 9102;
  ERR_FRIEND_BLOCKED           = 9103;
  ERR_FRIEND_LIMIT             = 9104; // 好友数已达上限

  ERR_LOCATOR_NOT_FOUND        = 9201;
  ERR_LOCATOR_CONFLICT         = 9202;

  // push 服务(W3 ④,2026-06-05)
  ERR_PUSH_OFFLINE_CORRUPTED   = 9301;
  ERR_PUSH_KAFKA_CONSUMER_DOWN = 9302;

  // guild 公会(9400-9499,2026-06-27)
  ERR_GUILD_NOT_FOUND          = 9401;  // 公会不存在
  ERR_GUILD_ALREADY_IN_GUILD   = 9402;  // 玩家已在某公会(单归属)
  ERR_GUILD_FULL               = 9403;  // 公会成员已达上限
  ERR_GUILD_NOT_LEADER         = 9404;  // 操作需会长权限
  ERR_GUILD_NO_PERMISSION      = 9405;  // 无权限(审批 / 踢人需会长或官员)
  ERR_GUILD_NAME_TAKEN         = 9406;  // 公会名已被占用
  ERR_GUILD_REQUEST_INVALID    = 9407;  // 加入申请不存在 / 非 pending
  ERR_GUILD_NOT_MEMBER         = 9408;  // 目标不在本公会

  // group 临时群(9500-9599,2026-06-27)
  ERR_GROUP_NOT_FOUND          = 9501;  // 群不存在
  ERR_GROUP_FULL               = 9502;  // 群成员已达上限
  ERR_GROUP_NOT_OWNER          = 9503;  // 操作需群主权限
  ERR_GROUP_NOT_MEMBER         = 9504;  // 玩家不在群内
  ERR_GROUP_ALREADY_IN         = 9505;  // 玩家已在群内(拉人幂等命中)

  // mail 邮件(9600-9699,2026-06-29)
  ERR_MAIL_NOT_FOUND           = 9601;  // 邮件不存在 / 已删除
  ERR_MAIL_EXPIRED             = 9602;  // 邮件已过期
  ERR_MAIL_NO_ATTACHMENT       = 9603;  // 该邮件无附件可领
  ERR_MAIL_ALREADY_CLAIMED     = 9604;  // 附件已领取(幂等命中)

  // 10000-10999 data_service
  ERR_DATA_VERSION_MISMATCH    = 10001;
  ERR_DATA_LOCK_TIMEOUT        = 10002;
  ERR_DATA_MIGRATE             = 10003;

  // 12000-12999 auction(全服拍卖行 / 撮合)
  ERR_AUCTION_ORDER_NOT_FOUND      = 12001;
  ERR_AUCTION_WRONG_STATE          = 12002;  // 订单已终态 / 不可撤
  ERR_AUCTION_NOT_OWNER            = 12003;  // 非挂单本人撤单
  ERR_AUCTION_INSUFFICIENT         = 12004;  // 结算资源不足(冻结 / 扣减失败)
  ERR_AUCTION_IDEMPOTENCY_CONFLICT = 12005;  // idempotency_key 复用到不同请求(指纹不一致)
  ERR_AUCTION_MARKET_BUSY          = 12006;  // market 跨实例单写者锁竞争超时(让客户端稍后重试)

  // 13000-13999 leaderboard(通用排行榜)
  ERR_LEADERBOARD_BOARD_NOT_FOUND  = 13001;  // 榜不存在(查询 / 结算空榜)
  ERR_LEADERBOARD_ENTRY_NOT_FOUND  = 13002;  // entity 不在榜上
  ERR_LEADERBOARD_INVALID_BOARD    = 13003;  // BoardKey 非法(board_type / scope 缺失)
  ERR_LEADERBOARD_SETTLE_CONFLICT  = 13004;  // settle_idempotency_key 复用到不同请求
  ERR_LEADERBOARD_REWARD_FAILED    = 13005;  // 结算发奖失败(inventory 不可用 / 扣发异常)
}
