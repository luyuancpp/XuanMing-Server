// Pandora LoginService 协议。
//
// 职责(docs/design/go-services.md §2.1):
//   - 账号注册 / 登录 / 登出
//   - 颁发 Session Token(给客户端)
//   - 颁发 DS Ticket(JWT,给 UE DS 校验)
//   - 验证 DS Ticket(防重放,jti 黑名单)
//
// W2 (2026-06-05) 加 google.api.http 注解(Kratos protoc-gen-go-http 用):
//   - 业务服同时暴露 gRPC + HTTP 两套 endpoint
//   - Envoy gRPC-Web filter 把客户端请求转 gRPC,优先走 gRPC
//   - HTTP endpoint 给运营后台 / 第三方 webhook 用,玩家客户端不直连

syntax = "proto3";

package pandora.login.v1;

import "pandora/common/v1/errcode.proto";
import "google/api/annotations.proto";

service LoginService {
  // Login 立即完成型(synchronous),response 含完整 session_token + hub 地址
  // kafka push 不发给 caller(他看 RPC response 即可)
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/login"
      body: "*"
    };
  }

  // Logout 立即完成型,清 session
  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {
      post: "/v1/logout"
      body: "*"
    };
  }

  // IssueDSTicket 立即完成型,DS 进入前 client 调拿短期票据
  rpc IssueDSTicket(IssueDSTicketRequest) returns (IssueDSTicketResponse) {
    option (google.api.http) = {
      post: "/v1/ds/ticket/issue"
      body: "*"
    };
  }

  // VerifyDSTicket 立即完成型,DS 内部用(不暴露 HTTP path 给客户端)
  // ⚠️ Envoy 应该用 ext_authz / route 限制此 path 只允许内网
  rpc VerifyDSTicket(VerifyDSTicketRequest) returns (VerifyDSTicketResponse) {
    option (google.api.http) = {
      post: "/v1/ds/ticket/verify"
      body: "*"
    };
  }
}

// ===== 登录 =====

message LoginRequest {
  string account        = 1;
  string password_hash  = 2;  // 客户端先 sha256
  string device_id      = 3;
  string client_version = 4;
  // 5-9 reserved core
  reserved 5 to 9;

  string region = 10;
  string locale = 11;
  // 12-49 reserved for client metadata
  reserved 12 to 49;
}

message LoginResponse {
  pandora.common.v1.ErrCode code = 1;
  uint64 player_id     = 2;
  string session_token = 3;  // 连后端 gRPC 用
  string hub_ds_addr   = 4;  // 直连大厅 DS 的 IP:port
  string hub_ticket    = 5;  // hub DS 票据(JWT)
  // [proto] 全服扩容三层化(docs/design/scale-cellular-20m.md §3.2/§3.3):玩家确定性路由落点。
  // 客户端 / 边缘网关据此把后续连接(gRPC-Web、push stream)连到正确 Region 的正确 Cell。
  // 单 Cell / dev 部署为 0。uint32 拓扑维度(非 snowflake 业务 ID,CLAUDE.md §9.12)。
  uint32 region_id = 6;
  uint32 cell_id   = 7;
  // 8-9 reserved
  reserved 8 to 9;
  // ===== 断线重连(docs/design/battle-reconnect.md)=====
  // 玩家已在 battle DS 中掉线,重新登录时 login 查 player_locator 发现其处于 BATTLE 态,
  // 直接下发原对局的 battle DS 直连信息(而非把玩家丢回大厅)。三字段"要么全空、要么全填":
  //   - 空(默认):玩家不在战斗中,客户端走 hub_ds_addr / hub_ticket 进大厅(既有流程)。
  //   - 非空:客户端应直连 battle_ds_addr 用 battle_ticket 重连原对局;
  //     连接失败(对局已结束 / 票据过期)再回退调 IssueDSTicket 拿 hub 地址回大厅。
  // battle 字段非空时 hub_ds_addr / hub_ticket 为空(login 检测到 BATTLE 不再分配 hub)。
  string battle_ds_addr = 10; // 直连 battle DS 的 IP:port
  string battle_ticket  = 11; // battle DS 票据(JWT,新 jti)
  uint64 match_id       = 12; // 重连对局 ID(Snowflake uint64,CLAUDE.md §9.11)
}

message LogoutRequest {
  string session_token = 1;
}

message LogoutResponse {
  pandora.common.v1.ErrCode code = 1;
}

// ===== DS 票据 =====

// DSTicket 是 JWT 的 payload(不直接传输,这里 message 描述结构以便 cpp/go 共享)。
message DSTicket {
  uint64 player_id      = 1;
  uint64 match_id       = 2;  // battle DS 才有,hub 为 0
  int64  issued_at_ms   = 3;
  int64  expires_at_ms  = 4;
  string ds_type        = 5;  // "hub" | "battle"
  string jti            = 6;  // JWT ID,防重放
  // [proto] 全服扩容三层化(docs/design/scale-cellular-20m.md §3.3):DS 票据绑定玩家路由落点,
  // 防 stale/伪造票据跨单元串号(把 A 单元玩家接进 B 单元 DS)。单 Cell/dev 为 0。
  // Go 侧 JWT claim 已落地(pkg/auth DSTicketClaims.region_id/cell_id);待 Codex regen 后
  // cpp 共享结构同步。uint32 拓扑维度(非 snowflake 业务 ID,CLAUDE.md §9.12)。
  uint32 region_id      = 7;
  uint32 cell_id        = 8;
  // 9 reserved
  reserved 9;
}

message IssueDSTicketRequest {
  string session_token = 1;
  string ds_type       = 2;  // "hub" | "battle"
  uint64 target_id     = 3;  // battle match_id,hub 为 0
}

message IssueDSTicketResponse {
  pandora.common.v1.ErrCode code = 1;
  string ticket = 2;  // JWT 编码后的字符串
  // ds_type=hub 时由 hub_allocator.AssignHub 返回的"当前有效"大厅 DS 地址。
  // 客户端结算返回大厅时必须用此地址(而非登录时缓存的旧地址),以应对 Hub DS 被 Agones
  // 重建/换端口/换分片。ds_type=battle 时为空(battle 地址来自 matchmaker / match 进度)。
  string hub_ds_addr = 3;
}

message VerifyDSTicketRequest {
  string ticket       = 1;
  string ds_pod_name  = 2;
}

message VerifyDSTicketResponse {
  pandora.common.v1.ErrCode code = 1;
  DSTicket claims = 2;
}
