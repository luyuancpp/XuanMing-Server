// Pandora DSAllocatorService 协议。
//
// 职责(docs/design/go-services.md §2.11):战斗 DS 调度(Agones GameServer)
// 实现:调用 Agones K8s API GameServerAllocation CRD,维护 redis 中的 DS 状态镜像
//
// ⚠️ Heartbeat 单向 unary(架构决策 2026-06-03):
//   go-zero zrpc 不支持 server stream,所以心跳改为 DS 每 5s 主动调用 unary RPC。
//   控制指令(stop / drain / reload_config)通过 response 字段下发,DS 在下次 Heartbeat
//   的响应里收到指令。允许的延迟 ≤ 5s,业务可接受。

syntax = "proto3";

package pandora.ds.v1;

import "common/v1/errcode.proto";

service DSAllocatorService {
  rpc AllocateBattle(AllocateBattleReq) returns (AllocateBattleResp);
  rpc ReleaseBattle(ReleaseBattleReq) returns (ReleaseBattleResp);
  rpc Heartbeat(HeartbeatReq) returns (HeartbeatResp);  // DS 每 5s 主动调
  rpc ListBattles(ListBattlesReq) returns (ListBattlesResp);
}

// ===== Allocate / Release =====

message AllocateBattleReq {
  string match_id  = 1;
  repeated int64 player_ids = 2;
  int32  map_id    = 3;
  string game_mode = 4;  // "ranked_5v5" | "casual_5v5" | "custom"
  // 5-9 reserved
  reserved 5 to 9;
}

message AllocateBattleResp {
  pandora.common.v1.ErrCode code = 1;
  string ds_addr        = 2;
  string ds_pod_name    = 3;
  int64  allocated_at_ms = 4;
}

message ReleaseBattleReq {
  string match_id = 1;
  string reason   = 2;  // "completed" | "abandoned" | "crash"
}

message ReleaseBattleResp {
  pandora.common.v1.ErrCode code = 1;
}

// ===== Heartbeat(单向 unary,DS 每 5s 调一次)=====

// DS 上报状态
message HeartbeatReq {
  string ds_pod_name = 1;
  string match_id    = 2;
  int32  player_count = 3;
  float  cpu_pct     = 4;
  float  mem_mb      = 5;
  string state       = 6;  // "warming" | "ready" | "running" | "ended"
  int64  ts_ms       = 7;
  // 8-9 reserved
  reserved 8 to 9;
}

// allocator 返回控制指令(DS 在下次 heartbeat 之间消费)
message HeartbeatResp {
  pandora.common.v1.ErrCode code = 1;
  string command = 2;  // "" | "stop" | "drain" | "reload_config"
  // 3-9 reserved for future control commands
  reserved 3 to 9;
}

// ===== List =====

message BattleInfo {
  string match_id    = 1;
  string ds_pod_name = 2;
  string ds_addr     = 3;
  string state       = 4;
  int32  player_count = 5;
  int64  allocated_at_ms = 6;
}

message ListBattlesReq {
  string state_filter = 1;  // 空 = 全部
}

message ListBattlesResp {
  pandora.common.v1.ErrCode code = 1;
  repeated BattleInfo battles = 2;
}
