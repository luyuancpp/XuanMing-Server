// Pandora DialogueService 协议。
//
// 职责(docs/design/go-services.md §2.10):NPC 对话树运行时
// 对话树存储:配置中心 / mysql `dialogue_trees` 表(json blob)
// MOBA 早期:简单 if-else,不上行为树

syntax = "proto3";

package pandora.dialogue.v1;

import "common/v1/errcode.proto";

service DialogueService {
  rpc StartDialogue(StartDialogueReq) returns (StartDialogueResp);
  rpc ChooseOption(ChooseOptionReq) returns (ChooseOptionResp);
  rpc EndDialogue(EndDialogueReq) returns (EndDialogueResp);
}

message DialogueOption {
  string option_id = 1;
  string text      = 2;
  bool   visible   = 3;  // 部分选项有前置条件
  // 4-9 reserved
  reserved 4 to 9;
}

message DialogueState {
  string dialogue_id = 1;  // 本次会话 ID
  int32  npc_id      = 2;
  string node_id     = 3;  // 当前节点
  string speaker     = 4;  // NPC 名字
  string text        = 5;  // 当前对话文本
  repeated DialogueOption options = 6;
  bool   ended       = 7;
  // 8-9 reserved
  reserved 8 to 9;
}

message StartDialogueReq {
  int64 player_id = 1;
  int32 npc_id    = 2;
}

message StartDialogueResp {
  pandora.common.v1.ErrCode code = 1;
  DialogueState state = 2;
}

message ChooseOptionReq {
  int64  player_id   = 1;
  string dialogue_id = 2;
  string option_id   = 3;
}

message ChooseOptionResp {
  pandora.common.v1.ErrCode code = 1;
  DialogueState state = 2;
}

message EndDialogueReq {
  int64  player_id   = 1;
  string dialogue_id = 2;
}

message EndDialogueResp {
  pandora.common.v1.ErrCode code = 1;
}
