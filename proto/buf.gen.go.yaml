# Pandora Proto Go 生成配置
#
# 用法:
#   cd proto && buf generate --template buf.gen.go.yaml
#
# 产物路径:proto/gen/go/<domain>/v1/*.pb.go
# 比如 proto/login/v1/login.proto → proto/gen/go/login/v1/{login.pb.go, login_grpc.pb.go, login_http.pb.go}
#
# 4 个 plugin(2026-06-05 W2 调整):
#   1. protobuf/go      生成 message
#   2. grpc/go          生成 gRPC server/client stub
#   3. kratos-http      生成 Kratos HTTP handler(由 google.api.http 注解驱动)
#   4. kratos-errors    生成 Kratos errors helper(可选,W3+ 启用)
#
# managed.go_package_prefix 让所有 .proto 自动得到统一的 go_package,
# 不需要在每个 .proto 里手写 option go_package。

version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/luyuancpp/pandora/proto/gen/go

plugins:
  # 1) protobuf message
  - remote: buf.build/protocolbuffers/go:v1.36.5
    out: gen/go
    opt:
      - paths=source_relative

  # 2) gRPC service stub
  - remote: buf.build/grpc/go:v1.5.1
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  # 3) Kratos HTTP handler(从 google.api.http 注解生成 RESTful HTTP server / client)
  #    生成 *_http.pb.go,业务侧 RegisterLoginServiceHTTPServer(srv, impl)
  - remote: buf.build/go-kratos/kratos:v2.9.2
    out: gen/go
    opt:
      - paths=source_relative

  # 4) (可选)Kratos errors helper —— W3+ 启用,这里先注释
  # - remote: buf.build/go-kratos/kratos-errors:v2.9.2
  #   out: gen/go
  #   opt:
  #     - paths=source_relative
