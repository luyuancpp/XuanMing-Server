# Pandora 开发环境基础设施
#
# 端口规划严格对齐 docs/design/infra.md §6.1。
#
# 用法:
#   pwsh tools/scripts/dev_up.ps1
#   pwsh tools/scripts/dev_down.ps1
#
# 数据卷默认保留(开发期重启不丢数据);彻底清理用 dev_down.ps1 -Volumes

services:
  # ===== MySQL 8.4 =====
  mysql:
    image: mysql:8.4
    container_name: pandora-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-pandora_dev_root}
      MYSQL_USER: ${MYSQL_USER:-pandora}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pandora_dev_pwd}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --max_connections=500
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-pandora_dev_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [pandora-net]

  # ===== Redis 8.8 =====
  redis:
    image: redis:8.8.0-alpine
    container_name: pandora-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - "1gb"
      - --maxmemory-policy
      - "allkeys-lru"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [pandora-net]

  # ===== Zookeeper(给 Kafka 用)=====
  zookeeper:
    image: confluentinc/cp-zookeeper:7.9.7
    container_name: pandora-zookeeper
    restart: unless-stopped
    ports:
      - "2182:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q 'Zookeeper version'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [pandora-net]

  # ===== Kafka(Zookeeper 模式,Confluent Platform 7.9.x 兼容线)=====
  kafka:
    image: confluentinc/cp-kafka:7.9.7
    container_name: pandora-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # 9092 docker 内部网络互访;9093 暴露给 host(go 服务连这个)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks: [pandora-net]

  # ===== etcd 3.6 =====
  etcd:
    image: quay.io/coreos/etcd:v3.6.12
    container_name: pandora-etcd
    restart: unless-stopped
    ports:
      - "2380:2379"  # client
      - "2381:2380"  # peer
    command:
      - /usr/local/bin/etcd
      - --name=pandora-etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=pandora-etcd=http://etcd:2380
      - --initial-cluster-token=pandora-etcd-cluster
      - --initial-cluster-state=new
    volumes:
      - etcd-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [pandora-net]

  # ===== Prometheus 2.55 =====
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: pandora-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    networks: [pandora-net]

  # ===== Grafana 11 =====
  grafana:
    image: grafana/grafana:11.3.1
    container_name: pandora-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-pandora_dev_admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks: [pandora-net]

  # ===== Envoy v1.38 边缘网关(W2 ④,2026-06-05)=====
  # 详见 deploy/envoy/README.md。
  #
  # 上游业务服跑在宿主(go run),通过 host.docker.internal 访问:
  #   - Windows / macOS Docker Desktop:自动解析
  #   - Linux:extra_hosts 用 host-gateway 显式映射
  #
  # 证书(cert.pem / key.pem)由 mkcert 在 deploy/envoy/ 下本机生成(不入库)。
  envoy:
    image: envoyproxy/envoy:v1.38-latest
    container_name: pandora-envoy
    restart: unless-stopped
    ports:
      - "8443:8443"   # 客户端 HTTPS / gRPC-Web 入口
      - "8444:8444"   # DS 面 HTTP / gRPC-Web 入口(UE Hub/Battle DS → 内部服务,agones-dev.md §5.1)
      - "9901:9901"   # admin(本机 only,生产关闭)
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./envoy/cert.pem:/etc/envoy/cert.pem:ro
      - ./envoy/key.pem:/etc/envoy/key.pem:ro
    extra_hosts:
      # Linux / WSL 兼容:让 envoy 容器能通过 host.docker.internal 访问宿主
      # Windows / macOS Docker Desktop 上写不写都行(默认已有)
      - "host.docker.internal:host-gateway"
    command:
      - -c
      - /etc/envoy/envoy.yaml
      - --service-cluster
      - pandora-edge
      - --service-node
      - dev-local
    networks: [pandora-net]

networks:
  pandora-net:
    name: pandora-net
    driver: bridge

volumes:
  mysql-data: { name: pandora-mysql-data }
  redis-data: { name: pandora-redis-data }
  zk-data:    { name: pandora-zk-data }
  zk-log:     { name: pandora-zk-log }
  kafka-data: { name: pandora-kafka-data }
  etcd-data:  { name: pandora-etcd-data }
  prom-data:  { name: pandora-prom-data }
  grafana-data: { name: pandora-grafana-data }
