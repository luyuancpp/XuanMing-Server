# Pandora Envoy 边缘网关本地开发期配置(W2 ④ + W3 ①,2026-06-05)。
#
# 职责(详见 docs/design/gateway-decision.md §5):
#   1. TLS 终止(:8443):客户端 HTTPS / gRPC-Web → Envoy 内部明文 gRPC
#   2. gRPC-Web → 标准 gRPC 协议转换(envoy.filters.http.grpc_web)
#   3. CORS(联调用,浏览器联调备用;UE FHttpModule 不强需)
#   4. 路由:按 gRPC 全路径 /pandora.<X>.v1.<Y>Service/ 分发到 login / push / team / match 等 cluster
#   5. W3 ①(2026-06-05):envoy.filters.http.jwt_authn 校验 SessionToken
#      - HS256 + 共享 secret(dev 用,生产期切 RS256 + remote_jwks)
#      - issuer=pandora-login / audience=pandora-client,要跟 login 服务 etc/login-dev.yaml 一致
#      - 把 sub claim 提到 x-pandora-player-id 头,业务服 pmw.AuthOptional/Required 直接读
#      - 对 push / team / match 等玩家鉴权 path 强制要 JWT;login / reflection / VerifyDSTicket bypass
#
# ⚠️ 协议铁律(详见 docs/design/protocol-ordering-rules.md):
#   - push.PushService/Subscribe 是 server stream,timeout 必须为 0(永不超时)
#   - cluster 端 idle_timeout 也设为 0(防上游被回收)
#
# W3+ 不启用的特性:
#   - envoy.filters.http.ext_authz / rate_limit
#   - mTLS 上行(W3 业务服规模化后再加)
#   - jti 黑名单(由 login.VerifyDSTicket / Logout 业务侧维护)
#
# 上游协议:**业务服默认明文 HTTP/2(h2c)**,本配置必须显式声明 http2_protocol_options,
# 否则 Envoy 会用 HTTP/1.1 调后端,gRPC 415 Unsupported Media Type。

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
  - name: pandora_listener
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8443
    filter_chains:
    - transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
          common_tls_context:
            tls_certificates:
            - certificate_chain:
                filename: /etc/envoy/cert.pem
              private_key:
                filename: /etc/envoy/key.pem
            alpn_protocols: [ "h2", "http/1.1" ]
      filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: pandora_hcm
          codec_type: AUTO

          # 全局 idle / request timeout 放开(server stream 长连接)
          # 单 route 再按需收紧(login/team unary demo 15s)
          stream_idle_timeout: 0s
          request_timeout: 0s
          common_http_protocol_options:
            idle_timeout: 0s

          access_log:
          - name: envoy.access_loggers.stdout
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog

          http_filters:
          # ⭐ 关键:gRPC-Web 字节流 → 标准 gRPC
          - name: envoy.filters.http.grpc_web
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb

          # CORS:浏览器联调备用;UE FHttpModule 不走 CORS
          - name: envoy.filters.http.cors
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors

          # ⭐ W3 ①:JWT 鉴权(HS256 + local_jwks)
          # provider pandora_session 用 login 服务签发的 SessionToken,issuer / audience
          # 必须跟 login etc/login-dev.yaml 的 login.jwt 完全一致。
          #
          # rules 列表只列"要鉴权的 path";没列到的 path(login / reflection / DS 票据 verify)
          # 默认放行。bypass 列表用空 requirement 走 allow_missing 语义。
          #
          # claim_to_headers 把 sub claim 写到 x-pandora-player-id 头,业务服 pkg/middleware
          # 读这个头注入 ctx。原始 Authorization 不 forward 给上游(forward=false),
          # 但 sub / exp 等通过 x-pandora-jwt-payload(base64url JSON)向上游透传。
          - name: envoy.filters.http.jwt_authn
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
              providers:
                pandora_session:
                  issuer: "pandora-login"
                  audiences: [ "pandora-client" ]
                  forward: false
                  forward_payload_header: "x-pandora-jwt-payload"
                  claim_to_headers:
                  - header_name: "x-pandora-player-id"
                    claim_name: "sub"
                  local_jwks:
                    # ⚠️ HS256 共享 secret 的 JWKS 形式:kty=oct, alg=HS256, k=base64url(secret)
                    #    base64url("pandora-dev-jwt-secret-change-me-32!") = cGFuZG9yYS1kZXYtand0LXNlY3JldC1jaGFuZ2UtbWUtMzIh
                    #    secret 跟 services/account/login/etc/login-dev.yaml 的 login.jwt.secret 必须保持一致。
                    inline_string: |
                      {"keys":[{"kty":"oct","alg":"HS256","kid":"pandora-dev","k":"cGFuZG9yYS1kZXYtand0LXNlY3JldC1jaGFuZ2UtbWUtMzIh"}]}
              rules:
              # login.Logout / IssueDSTicket 需要 SessionToken(player_id 从 sub claim 来)
              - match:
                  path: "/pandora.login.v1.LoginService/Logout"
                requires:
                  provider_name: "pandora_session"
              - match:
                  path: "/pandora.login.v1.LoginService/IssueDSTicket"
                requires:
                  provider_name: "pandora_session"
              # push.Subscribe 必须带 SessionToken(玩家长连接订阅,W3 ④ kafka 路由依赖 player_id)
              - match:
                  prefix: "/pandora.push.v1.PushService/"
                requires:
                  provider_name: "pandora_session"
              # team 服务所有写 RPC 均需 JWT(player_id 以 JWT sub 为准,R5)
              - match:
                  prefix: "/pandora.team.v1.TeamService/"
                requires:
                  provider_name: "pandora_session"
              # matchmaker 服务所有 RPC 均需 JWT(玩家发起匹配,player_id 经 sub claim 注入 x-pandora-player-id)
              - match:
                  prefix: "/pandora.match.v1.MatchService/"
                requires:
                  provider_name: "pandora_session"
              # friend 服务所有 RPC 均需 JWT(player_id 以 JWT sub 为准,R5)
              - match:
                  prefix: "/pandora.friend.v1.FriendService/"
                requires:
                  provider_name: "pandora_session"
              # chat 服务所有 RPC 均需 JWT(sender_id / player_id 以 JWT sub 为准,R5)
              - match:
                  prefix: "/pandora.chat.v1.ChatService/"
                requires:
                  provider_name: "pandora_session"
              # trade 服务所有 RPC 均需 JWT(交易双方身份以 JWT sub 为准,R5)
              - match:
                  prefix: "/pandora.trade.v1.TradeService/"
                requires:
                  provider_name: "pandora_session"
              # 没列到的 path(login.Login / login.VerifyDSTicket / grpc reflection)默认放行。
              # VerifyDSTicket 是 DS → login 的内部调用,不带玩家 JWT;靠 ext_authz 限内网(W3+)。

          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

          route_config:
            name: pandora_routes
            virtual_hosts:
            - name: pandora_vh
              domains: [ "*" ]

              # virtual_host 级 CORS 策略(联调宽松,生产收紧)
              typed_per_filter_config:
                envoy.filters.http.cors:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.CorsPolicy
                  allow_origin_string_match:
                  - safe_regex:
                      regex: ".*"
                  allow_methods: "POST, OPTIONS"
                  allow_headers: "content-type, x-grpc-web, x-user-agent, authorization, x-player-id, grpc-timeout"
                  expose_headers: "grpc-status, grpc-message, grpc-status-details-bin"
                  max_age: "600"

              routes:
              # ----- login(unary,立即完成型,demo 15s 超时)-----
              - match:
                  prefix: "/pandora.login.v1.LoginService/"
                route:
                  cluster: login_cluster
                  timeout: 15s
                  idle_timeout: 60s

              # ----- push(server stream,长连接必须 0 超时)-----
              - match:
                  prefix: "/pandora.push.v1.PushService/"
                route:
                  cluster: push_cluster
                  # ⭐ server stream 铁律:timeout=0(否则 Envoy 默认 15s 后断流)
                  timeout: 0s
                  idle_timeout: 0s

              # ----- team(unary,立即完成型,demo 15s 超时)-----
              - match:
                  prefix: "/pandora.team.v1.TeamService/"
                route:
                  cluster: team_cluster
                  timeout: 15s
                  idle_timeout: 60s

              # ----- matchmaker(unary,立即受理型,demo 15s 超时)-----
              # 撮合进度由 pandora.match.progress push 驱动,这里只是受理 RPC,不是长连。
              - match:
                  prefix: "/pandora.match.v1.MatchService/"
                route:
                  cluster: match_cluster
                  timeout: 15s
                  idle_timeout: 60s

              # ----- friend(unary,立即完成型,demo 15s 超时)-----
              - match:
                  prefix: "/pandora.friend.v1.FriendService/"
                route:
                  cluster: friend_cluster
                  timeout: 15s
                  idle_timeout: 60s

              # ----- chat(unary,立即完成型,demo 15s 超时)-----
              - match:
                  prefix: "/pandora.chat.v1.ChatService/"
                route:
                  cluster: chat_cluster
                  timeout: 15s
                  idle_timeout: 60s

              # ----- trade(unary,立即完成型,demo 15s 超时)-----
              - match:
                  prefix: "/pandora.trade.v1.TradeService/"
                route:
                  cluster: trade_cluster
                  timeout: 15s
                  idle_timeout: 60s

              # ----- gRPC reflection(联调用,grpcurl list/describe)-----
              # W2 dev:放行,联调省心
              # W3 生产:用 ext_authz / direct_response 403 块掉
              - match:
                  prefix: "/grpc.reflection.v1.ServerReflection/"
                route:
                  cluster: login_cluster   # 任意一个上游都行(reflection 是 server-level)
                  timeout: 0s
                  idle_timeout: 0s
              - match:
                  prefix: "/grpc.reflection.v1alpha.ServerReflection/"
                route:
                  cluster: login_cluster
                  timeout: 0s
                  idle_timeout: 0s

  # ============================================================================
  # DS gRPC-Web 入口监听器(:8444) —— UE Hub/Battle DS → 内部服务(agones-dev.md §5.1 方案 A)
  # ----------------------------------------------------------------------------
  # 为什么独立监听器而不是复用 :8443:
  #   :8443 是「客户端面」(玩家 SessionToken + jwt_authn),若把内部服务路由挂上去,
  #   未列入 jwt_authn rules 的 path 会被 allow_missing 放行 → 任意公网客户端可直接调
  #   battle_result.ReportResult / locator.SetLocation 伪造战绩/定位。故 DS 面单独开
  #   :8444,与客户端面物理隔离,便于后续单独加 mTLS / 网络策略锁死「只允许 DS pod 访问」。
  #
  # UE DS 走 gRPC-Web(FHttpModule),内部服务(hub :50021 / ds :50020 / locator :50006 /
  # battle_result :50022)裸端口是原生 gRPC(h2c),这里用 grpc_web filter 做协议转换。
  # UE DS `UPandoraDSBackendSubsystem` 的 4 个 Endpoint 经 SetEndpoints / Game.ini 指向
  # 本监听器(dev: https://host:8444,bUseTls=true),路径按 gRPC 全名路由到各内部服务。
  #
  # ⚠️ 鉴权说明:本监听器**不挂 player jwt_authn**(DS→后端内部调用不带玩家 SessionToken,
  # 内部服务用 pmw.AuthOptional)。DS 身份真正校验发生在 UE NetDriver 层的 DSTicket 校验
  # (PreLogin/InitNewPlayer,见 agones-dev.md §5)。生产期须对 :8444 加网络隔离 + mTLS/ext_authz,
  # 不可直接暴露公网。
  # ============================================================================
  - name: pandora_ds_listener
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8444
    filter_chains:
    - transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
          common_tls_context:
            tls_certificates:
            - certificate_chain:
                filename: /etc/envoy/cert.pem
              private_key:
                filename: /etc/envoy/key.pem
            alpn_protocols: [ "h2", "http/1.1" ]
      filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: pandora_ds_hcm
          codec_type: AUTO
          stream_idle_timeout: 0s
          request_timeout: 0s
          common_http_protocol_options:
            idle_timeout: 0s
          access_log:
          - name: envoy.access_loggers.stdout
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
          http_filters:
          # ⭐ gRPC-Web 字节流 → 标准 gRPC(DS 侧同客户端,复用 grpc-web codec)
          - name: envoy.filters.http.grpc_web
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
          # 注意:DS 面不挂 jwt_authn(见上方鉴权说明)。
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          route_config:
            name: pandora_ds_routes
            virtual_hosts:
            - name: pandora_ds_vh
              domains: [ "*" ]
              routes:
              # ----- Hub DS → hub_allocator.Heartbeat(unary 5s 心跳)-----
              - match:
                  prefix: "/pandora.hub.v1.HubAllocatorService/"
                route:
                  cluster: hub_allocator_cluster
                  timeout: 15s
                  idle_timeout: 60s
              # ----- Battle DS → ds_allocator.Heartbeat(unary 5s 心跳)-----
              - match:
                  prefix: "/pandora.ds.v1.DSAllocatorService/"
                route:
                  cluster: ds_allocator_cluster
                  timeout: 15s
                  idle_timeout: 60s
              # ----- Hub DS → player_locator.SetLocation(HUB 上报)-----
              - match:
                  prefix: "/pandora.locator.v1.PlayerLocatorService/"
                route:
                  cluster: locator_cluster
                  timeout: 15s
                  idle_timeout: 60s
              # ----- Battle DS → battle_result.ReportResult(同步结算上报,§6)-----
              - match:
                  prefix: "/pandora.battle.v1.BattleResultService/"
                route:
                  cluster: battle_result_cluster
                  timeout: 15s
                  idle_timeout: 60s

  clusters:
  # ===== login_cluster =====
  - name: login_cluster
    type: STRICT_DNS
    # ⭐ 强制 IPv4：Windows Docker Desktop 上 host.docker.internal 默认返 IPv6，
    #   envoy 连上去会 cx_connect_fail → upstream connect error。
    #   Linux 同样用 host-gateway 时 IPv4 才能走通。
    dns_lookup_family: V4_ONLY
    connect_timeout: 1s
    lb_policy: ROUND_ROBIN
    # ⭐ 上游 h2c:业务服跑的是明文 HTTP/2,不显式声明会用 HTTP/1.1 → gRPC 415
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: login_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                # ⭐ host.docker.internal:Windows / macOS Docker Desktop 默认解析到宿主
                #   Linux:docker-compose 用 extra_hosts: host-gateway 补,见 docker-compose.dev.yml
                address: host.docker.internal
                port_value: 50001

  # ===== push_cluster(server stream,idle 0)=====
  - name: push_cluster
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY   # 同 login_cluster，避 IPv6 解析坐这个坑
    connect_timeout: 1s
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
        # 上游 idle 也设 0,防 push stream 被 Envoy 主动断
        common_http_protocol_options:
          idle_timeout: 0s
    load_assignment:
      cluster_name: push_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: host.docker.internal
                port_value: 50014

  # ===== team_cluster(unary,demo 15s 超时)=====
  - name: team_cluster
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    connect_timeout: 1s
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: team_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: host.docker.internal
                port_value: 50010

  # ===== match_cluster(matchmaker unary,demo 15s 超时)=====
  - name: match_cluster
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    connect_timeout: 1s
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: match_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: host.docker.internal
                port_value: 50011

  # ===== friend_cluster(unary,demo 15s 超时)=====
  - name: friend_cluster
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    connect_timeout: 1s
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: friend_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: host.docker.internal
                port_value: 50004

  # ===== chat_cluster(unary,demo 15s 超时)=====
  - name: chat_cluster
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    connect_timeout: 1s
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: chat_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: host.docker.internal
                port_value: 50005

  # ===== trade_cluster(unary,demo 15s 超时)=====
  - name: trade_cluster
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    connect_timeout: 1s
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: trade_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: host.docker.internal
                port_value: 50012

  # ===========================================================================
  # DS 面内部服务 cluster(供 :8444 pandora_ds_listener 使用,agones-dev.md §5.1)
  # 全部 h2c 上游(业务服明文 HTTP/2),host.docker.internal 解析到宿主机进程。
  # ===========================================================================

  # ===== hub_allocator_cluster(Hub DS 心跳,:50021)=====
  - name: hub_allocator_cluster
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    connect_timeout: 1s
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: hub_allocator_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: host.docker.internal
                port_value: 50021

  # ===== ds_allocator_cluster(Battle DS 心跳,:50020)=====
  - name: ds_allocator_cluster
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    connect_timeout: 1s
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: ds_allocator_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: host.docker.internal
                port_value: 50020

  # ===== locator_cluster(Hub DS SetLocation(HUB),:50006)=====
  - name: locator_cluster
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    connect_timeout: 1s
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: locator_cluster
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
