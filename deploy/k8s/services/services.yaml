# Pandora 18 个 go 业务服务（k8s Deployment + Service）
#
# 镜像:pandora/<svc>:dev(k8s 模式由 start.ps1 docker build 后 `minikube image load`;
#       online 模式由 kustomize overlay 把镜像换成 registry 推送的带版本 tag)。
# 配置:configmap pandora-config(launcher 用 run/cluster/etc 现场生成),
#       按 subPath 把 <svc>.yaml 挂成 /app/etc/cluster.yaml。
#
# Service 短名 = 服务名,同 namespace 内 <svc>:<port> 直连(与 docker/compose 对齐)。
#
# 这个文件很长但全是同构片段;新增服务照抄一段、改 4 处(name/image/configKey/port)即可。
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: login, namespace: pandora, labels: { app: login } }
spec:
  replicas: 1
  selector: { matchLabels: { app: login } }
  template:
    metadata: { labels: { app: login } }
    spec:
      containers:
        - name: login
          image: pandora/login:dev
          imagePullPolicy: IfNotPresent
          args: ["-conf", "etc/cluster.yaml"]
          ports: [ { containerPort: 50001 } ]
          volumeMounts: [ { name: conf, mountPath: /app/etc/cluster.yaml, subPath: login.yaml, readOnly: true } ]
          resources: { requests: { cpu: 25m, memory: 64Mi }, limits: { cpu: "1", memory: 256Mi } }
      volumes: [ { name: conf, configMap: { name: pandora-config } } ]
---
apiVersion: v1
kind: Service
metadata: { name: login, namespace: pandora }
spec: { selector: { app: login }, ports: [ { port: 50001, targetPort: 50001 } ] }
